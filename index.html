<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcular Cuotas - PreEstamos</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="icon" href="logo PreEstamos.jpeg" type="image/png">
</head>

<body>
    <div class="container">
        
        <div class="input-group">
            <h3>CRÉDITOS PARA MODELOS A PARTIR DE 2010:</h3>
            <input type="text" id="monto" oninput="calcular()" onchange="calcular()" placeholder="Ingrese el monto">
        </div>

        <div class="input-group">
            <div id="tipoPrestamoContainer" class="button-group">
                <button type="button" 
                        data-tasa="9" 
                        data-tipo="PESOS"
                        class="btn-prestamo active"
                        onclick="seleccionarTasa(this, 9)">
                    PESOS - AUTOPRENDA
                </button>
                </div>
        </div>
        <h1 class="titulo-con-logo">
            <img src="logo PreEstamos.jpeg" alt="Logo" class="logo-h1">
            PreEstamos
        </h1>
        <div id="cuotasDestacadas" class="destacados-container"></div>

        <div id="tablaResultados"></div>
    </div>

    <script src="app.js"></script>
    <script>
        // Inicialización al cargar la página
        document.addEventListener('DOMContentLoaded', () => {
             document.getElementById('tipoPrestamoContainer').dataset.tasaActiva = 9;
             calcular();
        });
        
        function seleccionarTasa(elemento, tasa) {
            const botones = document.querySelectorAll('.btn-prestamo');
            botones.forEach(btn => btn.classList.remove('active'));
            elemento.classList.add('active');
            document.getElementById('tipoPrestamoContainer').dataset.tasaActiva = tasa;
            calcular();
        }
    </script>
</body>
</html>
